<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>რეგისტრაცია — F1 Stats</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">F1<span>STATS</span></div>

        <h1 class="auth-heading">რეგისტრაცია</h1>
        <p class="auth-sub">შექმენი ანგარიში და მიიღე F1 შეტყობინებები</p>

        <div id="error-box" class="form-error"></div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="firstName">სახელი</label>
                <input class="form-input" type="text" id="firstName" placeholder="გია" autocomplete="given-name">
            </div>
            <div class="form-group">
                <label class="form-label" for="lastName">გვარი</label>
                <input class="form-input" type="text" id="lastName" placeholder="გიორგაძე" autocomplete="family-name">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label" for="email">ემაილი</label>
            <input class="form-input" type="email" id="email" placeholder="name@example.com" autocomplete="email">
        </div>

        <div class="form-group">
            <label class="form-label" for="password">პაროლი <span style="color:var(--muted);font-weight:400">(მინ. 8 სიმბოლო)</span></label>
            <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="new-password">
        </div>

        <button class="btn btn-primary btn-block" id="reg-btn" onclick="doRegister()">რეგისტრაცია</button>

        <div class="auth-footer">
            უკვე გაქვს ანგარიში? <a href="/login.html">შესვლა</a>
        </div>
    </div>
</div>

<script src="/app.js"></script>
<script>
    if (Auth.isLoggedIn()) window.location.href = '/index.html';

    async function doRegister() {
      const firstName = document.getElementById('firstName').value.trim();
      const lastName  = document.getElementById('lastName').value.trim();
      const email     = document.getElementById('email').value.trim();
      const password  = document.getElementById('password').value;
      const errBox    = document.getElementById('error-box');
      const btn       = document.getElementById('reg-btn');

      errBox.classList.remove('show');

      if (!firstName || !lastName || !email || !password) {
        errBox.textContent = 'გთხოვთ შეავსოთ ყველა ველი.';
        errBox.classList.add('show');
        return;
      }

      if (password.length < 8) {
        errBox.textContent = 'პაროლი მინიმუმ 8 სიმბოლო უნდა იყოს.';
        errBox.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        const data = await apiFetch('/auth/register', {
          method: 'POST',
          body: JSON.stringify({ firstName, lastName, email, password }),
        });
        Auth.save(data);
        window.location.href = '/index.html';
      } catch(e) {
        errBox.textContent = e.message;
        errBox.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'რეგისტრაცია';
      }
    }
</script>
</body>
</html>
